name: Feature Request
description: Suggest new functionality or improvements
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## Thanks for your suggestion!
        
        Help us understand what you'd like added and why it would be useful.

  - type: textarea
    id: idea
    attributes:
      label: What feature would you like?
      description: "Describe the functionality in your own words"
      placeholder: "I wish Borealis could..."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: "What current limitation or pain point does this address?"
      placeholder: "Currently, there's no way to... This makes it hard to..."

  - type: textarea
    id: solution
    attributes:
      label: Your proposed solution
      description: "How do you envision this working? Any implementation ideas?"
      placeholder: "It would be great if users could..."

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice-to-have enhancement
        - Important quality-of-life improvement
        - High-priority 
        - Critical 
    validations:
      required: true
