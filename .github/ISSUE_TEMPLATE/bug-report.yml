name: Bug Report
description: Report unexpected behavior or crashes
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Welcome! Thanks for helping improve Borealis!
        
        Please fill out the form below as completely as possible. The more detail you provide, the faster we can investigate and fix the issue.

  - type: input
    id: version
    attributes:
      label: Borealis Version
      description: "Specify exact version number/relevant information"
      placeholder: "e.g., 0.1.2"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: "Which OS are you running Borealis on?"
      options:
        - Windows 10/11
        - macOS
        - Linux
        - Other (please specify in description)
    validations:
      required: true

  - type: input
    id: hardware
    attributes:
      label: Hardware Specifications
      description: "CPU model, number of cores, RAM amount (helpful for performance-related bugs)"
      placeholder: "e.g., Intel i7-9700K, 8 cores, 16GB RAM"

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: "Describe the unexpected behavior clearly and concisely"
      placeholder: "When I play an en passant capture, the capturing pawn doesn't move."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: "Walk me through how to trigger this bug step by step."
      placeholder: |
        Play an en passant capture.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: "What did you expect to happen instead?"
      placeholder: "I expected the engine to play a legal move instead..."

  - type: textarea
    id: fen_position
    attributes:
      label: Position in FEN Format
      description: "If applicable, share the board state when the bug occurred"
      placeholder: "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1"
      render: plaintext

  - type: textarea
    id: logs
    attributes:
      label: Error Logs / Console Output
      description: "Copy any error messages here"
      placeholder: "Paste log content here..."
      render: bash

  - type: checkboxes
    id: reproduction
    attributes:
      label: Can you reproduce consistently?
      description: "Select all that apply"
      options:
        - label: Yes, happens every time I try these steps
        - label: Intermittent — sometimes occurs, sometimes doesn't
        - label: Only observed once so far
        - label: Unable to reproduce after initial discovery

  - type: dropdown
    id: severity
    attributes:
      label: How severe is this issue?
      options:
        - Minor inconvenience 
        - Moderate (playable but irritating)
        - Significant (engine crashes frequently, game-breaking)
        - Critical (engine produces illegal moves / wrong evaluations)
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: "Screenshots, PGN files, configuration files, or anything else relevant"
      placeholder: "Attach files or describe anything that might help us understand the issue better..."
