name: Pull Request
description: Submit code changes for review
body:
  - type: markdown
    attributes:
      value: |
        ## Thank you for contributing to Borealis!
        
        Please fill out the sections below to help me understand your changes and hasten the approval process.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "Summarize what this PR does and why it's needed"
      placeholder: "Fixes bug where... / Adds feature for... / Refactors module to..."
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type of Change
      options:
        - New Feature (adds functionality)
        - Bug Fix (resolves unexpected behavior)
        - Performance Improvement
        - Code Refactoring
        - Test Addition/Modification
        - Documentation 
    validations:
      required: true

  - type: textarea
    id: related_issues
    attributes:
      label: Related Issues
      description: "Link any related issues using #number syntax (e.g., Fixes #42, Closes #101)"
      placeholder: "Closes #___\nPartially addresses #___"

  - type: textarea
    id: testing
    attributes:
      label: Testing Performed
      description: "How did you verify these changes work correctly?"
      placeholder: |
        - [ ] Tested on Windows with position X
        - [ ] Ran benchmark suite against reference engine
        - [ ] Verified no regressions in opening book loading
        - [ ] Unit tests pass locally
        
      render: bash

  - type: checkboxes
    id: checklist
    attributes:
      label: Review Checklist
      description: "Please confirm before submitting"
      options:
        - label: Code follows existing style/conventions
          required: false
        - label: Self-reviewed my code
          required: false
        - label: Added comments explaining complex logic
          required: false
        - label: Updated README/docs if necessary
          required: false
        - label: No new warnings from compiler/static analyzer
          required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots/Logs (if applicable)
      description: "Include visual proof for UI changes or performance metrics"
      placeholder: "Before/after comparison graphs, log outputs, or terminal captures..."

  - type: textarea
    id: breaking_changes
    attributes:
      label: Breaking Changes?
      description: "Does this introduce any API/configuration changes requiring users to update their setups?"
      placeholder: "YES - Changed config option 'threads' to 'cpu_threads'. Migration guide attached.\nNO - Fully backward compatible."

  - type: input
    id: reviewer
    attributes:
      label: Suggested Reviewers (optional)
      description: "@username,@another_user who might have relevant expertise"
      default: "@chestertonian"
